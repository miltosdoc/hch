server {
    listen 80;
    server_name _;

    # Holter Review - strip prefix
    location /holter-review/ {
        proxy_pass http://holter-review:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /holter-review {
        rewrite ^ /holter-review/ last;
    }

    # Holter Tracker - strip prefix
    location /holter-tracker/ {
        proxy_pass http://holter-tracker:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /holter-tracker {
        rewrite ^ /holter-tracker/ last;
    }

    # ECG Archive - strip prefix
    location /ecg-archive/ {
        proxy_pass http://ecg-archive:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /ecg-archive {
        rewrite ^ /ecg-archive/ last;
    }

    # Main portal (everything else)
    location / {
        proxy_pass http://portal:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    client_max_body_size 100M;
}
