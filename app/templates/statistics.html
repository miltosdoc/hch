{% extends "base.html" %}
{% block title %}Statistik{% endblock %}
{% block content %}
<h2 class="h2">&#128202; Statistik</h2>
<div class="card" id="summary"><h3>Väntetider</h3><p class="t2">Laddar...</p></div>
<div class="card">
    <div class="fbtw mb12">
        <h3>Patienter</h3>
        <div class="fl">
            <button class="btn bgh" style="font-size:12px;padding:5px 10px" onclick="load('')">Alla</button>
            <button class="btn bgh" style="font-size:12px;padding:5px 10px" onclick="load('incoming')">Inkomna</button>
            <button class="btn bgh" style="font-size:12px;padding:5px 10px" onclick="document.location='/api/export/csv'">&#128230; Export CSV</button>
        </div>
    </div>
    <div class="tw"><table id="tbl">
        <tr><th>PN</th><th>Namn</th><th>Remiss</th><th>Vårdgaranti</th><th>Bokning</th><th>&#197;terbesök</th><th></th></tr>
    </table></div>
</div>
<script>
async function load(mode){
    const url=mode?`/api/patients?mode=${mode}`:'/api/patients';
    const r=await fetch(url);const d=await r.json();
    const t=document.getElementById('tbl');
    t.innerHTML='<tr><th>PN</th><th>Namn</th><th>Remiss</th><th>Vårdgaranti</th><th>Bokning</th><th>&#197;terbesök</th><th></th></tr>';
    d.forEach(p=>{
        t.innerHTML+=`<tr><td style="font-family:monospace;font-size:12px">${p.personal_number||'-'}</td>
        <td>${p.first_name||''} ${p.last_name||''}</td>
        <td>${p.referral_date||'-'}</td><td>${p.vardgaranti_date||'-'}</td><td>${p.first_booking_date||'-'}</td>
        <td><span class="bd ${p.is_aterbesok?'br':'bb'}">${p.is_aterbesok?'Ja':''}</span></td>
        <td><button class="btn bgh" style="padding:3px 8px;font-size:11px" onclick="tog('${p.personal_number}')">Toggle</button></td></tr>`;
    });
    const sr=await fetch('/api/statistics/summary');const sd=await sr.json();
    document.getElementById('summary').innerHTML=`<h3>Väntetider</h3>
    <div class="fl" style="gap:24px">
        <div><div class="t2">Remiss</div><div style="font-size:20px;font-weight:700">${sd.referral.mean||0}d</div><div class="t3">medel</div></div>
        <div><div class="t2">Vårdgaranti</div><div style="font-size:20px;font-weight:700">${sd.vardgaranti.mean||0}d</div><div class="t3">medel</div></div>
        <div><div class="t2">Totalt</div><div style="font-size:20px;font-weight:700">${sd.total}</div><div class="t3">patienter</div></div>
    </div>`;
}
async function tog(pn){await fetch(`/api/patient/${pn}/toggle`,{method:'POST'});load();}
load();
</script>
{% endblock %}
