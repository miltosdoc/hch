<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}HCH{% endblock %} — Hjärtcentrum Halland</title>
    <style>
    :root{
        --navy:#1b2a4a;--teal:#2ab5a0;--teal-dark:#1f8f7e;
        --bg:#f0f2f5;--bg-primary:#fff;--bg-secondary:#f8fafb;--bg-tertiary:#e9ecf0;--bg-input:#fff;
        --border:#d8dde6;--border-light:#eaedf1;--text-primary:#1a1f2e;--text-secondary:#5b6170;--text-tertiary:#8a90a0;
        --shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 2px 8px rgba(0,0,0,.08);
        --radius:12px;--radius-sm:8px;
        --success:#22c55e;--success-bg:rgba(34,197,94,.08);--danger:#ef4444;--danger-bg:rgba(239,68,68,.08);
        --warning:#f59e0b;--warning-bg:rgba(245,158,11,.08);--teal-bg:rgba(42,181,160,.08);
    }
    [data-theme="dark"]{
        --bg:#0a0e1a;--bg-primary:#111827;--bg-secondary:#0f1525;--bg-tertiary:#1a2035;--bg-input:#1a2035;
        --border:#1e293b;--border-light:#162034;--text-primary:#f0f2f5;--text-secondary:#94a3b8;--text-tertiary:#64748b;
        --shadow-sm:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 2px 8px rgba(0,0,0,.4);
        --success-bg:rgba(34,197,94,.15);--danger-bg:rgba(239,68,68,.15);--warning-bg:rgba(245,158,11,.15);--teal-bg:rgba(42,181,160,.15);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;background:var(--bg);color:var(--text-primary);line-height:1.55;min-height:100vh;transition:background .3s,color .3s}
    a{color:inherit;text-decoration:none}
    .topbar{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 10px rgba(27,42,74,.4)}
    .tb{max-width:1100px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:12px}
    .tb img{height:26px}.spacer{flex:1}
    .nb{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);cursor:pointer;transition:all .15s}
    .nb:hover{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3)}
    .nb.home:hover{color:rgba(42,181,160,1);border-color:var(--teal)}
    .nb.out:hover{color:#fca5a5;border-color:#ef4444;background:rgba(239,68,68,.15)}
    .tbtn{background:none;border:none;cursor:pointer;font-size:18px;padding:5px 8px;color:rgba(255,255,255,.7);border-radius:var(--radius-sm)}
    .tbtn:hover{background:rgba(255,255,255,.1);color:#fff}
    .main{max-width:1100px;margin:0 auto;padding:28px 20px 40px}
    @media(max-width:700px){.main{padding:16px 14px 32px}.tb{padding:8px 14px}.tb img{height:20px}.nb{padding:6px 10px;font-size:12px}}
    .card{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
    .card h3{font-size:16px;font-weight:650;margin-bottom:14px;color:var(--text-primary)}
    .ptitle{font-size:22px;font-weight:700;margin-bottom:4px}.psub{font-size:14px;color:var(--text-secondary);margin-bottom:20px}
    .fl{margin-bottom:14px}
    .fl label{display:block;font-size:13px;font-weight:550;color:var(--text-primary);margin-bottom:6px}
    input,select,textarea{width:100%;padding:10px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:14px;font-family:inherit}
    input:focus,select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(42,181,160,.12)}
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:600px){.fg{grid-template-columns:1fr}}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
    .btn:active{transform:scale(.97)}
    .bp{background:var(--navy);color:#fff}.bp:hover{background:var(--teal-dark)}.bt{background:var(--teal);color:#fff}.bt:hover{background:var(--teal-dark)}
    .bo{background:none;border:1px solid var(--border);color:var(--text-secondary)}.bo:hover{background:var(--bg-tertiary)}
    .tw{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:10px 12px;background:var(--bg-secondary);border-bottom:2px solid var(--border);color:var(--text-tertiary);font-size:11px;text-transform:uppercase;font-weight:600;white-space:nowrap}
    td{padding:10px 12px;border-bottom:1px solid var(--border-light);vertical-align:middle}
    tbody tr:hover>td{background:var(--bg-tertiary)}
    .bdg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:650}
    .bg2g{background:var(--success-bg);color:var(--success)}.bg2r{background:var(--danger-bg);color:var(--danger)}.bg2y{background:var(--warning-bg);color:var(--warning)}
    .uz{border:2px dashed var(--border);border-radius:var(--radius);padding:36px 20px;text-align:center;color:var(--text-tertiary);cursor:pointer;transition:all .2s;background:var(--bg-secondary)}
    .uz:hover,.uz.dragover{border-color:var(--teal);background:rgba(42,181,160,.04);color:var(--teal)}
    .uz .uicon{font-size:36px;margin-bottom:8px;display:block}
    .alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px}
    .al-ok{background:var(--success-bg);color:var(--success);border:1px solid var(--success)}
    .al-err{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger)}
    .fx{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.fb{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .mt8{margin-top:8px}.mt12{margin-top:12px}.mb12{margin-bottom:12px}.hidden{display:none}
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="topbar"><div class="tb">
        <img src="/static/logo.png" alt="HCH">
        {% block nav_extra %}{% endblock %}
        <div class="spacer"></div>
        <button class="tbtn" onclick="toggleTheme()"><span id="theme-icon">&#127769;</span></button>
        {% if portal_url %}<a class="nb home" href="{{ portal_url }}">&#8592; Hem</a>{% endif %}
        {% if portal_url %}<a class="nb out" href="{{ portal_url }}/logout">&#10005; Logga ut</a>{% endif %}
    </div></div>
    <main class="main">{% block content %}{% endblock %}</main>
    {% block scripts %}{% endblock %}
    <script>
    (function(){var s=localStorage.getItem('hch-theme');if(s)document.documentElement.setAttribute('data-theme',s);var c=document.documentElement.getAttribute('data-theme');var i=document.getElementById('theme-icon');if(i)i.textContent=c==='dark'?'\u2600\ufe0f':'\ud83c\udf19'})();
    function toggleTheme(){var c=document.documentElement.getAttribute('data-theme');var n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('hch-theme',n);var i=document.getElementById('theme-icon');if(i)i.textContent=n==='dark'?'\u2600\ufe0f':'\ud83c\udf19'}
    </script>
</body>
</html>
