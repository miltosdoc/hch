{% extends 'base.html' %}
{% block nav_extra %}
    <a class="nb active" href="/ecg-archive" style="color:var(--teal-light);border-color:var(--teal)">Arkiv</a>
{% endblock %}
{% block title %}ECG Archive{% endblock %}
{% block content %}
<h2 class="ptitle"> ECG Archive</h2>
<p class="psub">Arkivera ECG PDF-filer. Söks med filnamn eller personnummer.</p>

<div class="card">
    <h3>Upload</h3>
    <form id="uf" onsubmit="event.preventDefault();upload()">
        <div class="fg">
            <div class="fl"><label>Fil</label><input type="file" id="ufi" accept=".pdf" required></div>
            <div class="fl"><label>Personnummer</label><input id="upn" placeholder="valfritt"></div>
        </div>
        <div class="fg">
            <div class="fl"><label>Namn</label><input id="uname" placeholder="valfritt"></div>
            <div class="fl"><label>Datum</label><input id="udate" type="date"></div>
        </div>
        <button class="btn bt" type="submit">Spara</button>
    </form>
    <div id="status"></div>
</div>

<div class="card">
    <div class="fb mb12">
        <h3>Arkiv</h3>
        <input id="search" placeholder="Sök..." style="width:200px" oninput="filter(this.value)">
    </div>
    <div class="tw"><table id="tbl"><tr><th>Fil</th><th>PN</th><th>Namn</th><th>Datum</th><th></th></tr></table></div>
</div>

<script>
async function upload(){const fd=new FormData();fd.append('file',document.getElementById('ufi').files[0]);fd.append('pnr',document.getElementById('upn').value);fd.append('name',document.getElementById('uname').value);fd.append('exam_date',document.getElementById('udate').value);const r=await fetch('/upload',{method:'POST',body:fd});const d=await r.json();document.getElementById('status').innerHTML=`<div class="alert ${d.ok?'al-ok':'al-err'}">${d.msg}</div>`;loadAll();}
async function loadAll(){const r=await fetch('/api/list');const d=await r.json();const t=document.getElementById('tbl');t.innerHTML='<tr><th>Fil</th><th>PN</th><th>Namn</th><th>Datum</th><th></th></tr>';window._ecgs=d;d.forEach(e=>{t.innerHTML+=`<tr><td>${e.filename}</td><td>${e.personal_number||'-'}</td><td>${e.patient_name||'-'}</td><td>${e.exam_date||''}</td><td><a class="btn bo bs" href="/file/${e.id}" target="_blank">Öppna</a></td></tr>`;});}
function filter(q){const d=window._ecgs||[];const t=document.getElementById('tbl');t.innerHTML='<tr><th>Fil</th><th>PN</th><th>Namn</th><th>Datum</th><th></th></tr>';d.filter(e=>!q||e.filename.toLowerCase().includes(q.toLowerCase())||(e.personal_number||'').includes(q)).forEach(e=>{t.innerHTML+=`<tr><td>${e.filename}</td><td>${e.personal_number||'-'}</td><td>${e.patient_name||'-'}</td><td>${e.exam_date||''}</td><td><a class="btn bo bs" href="/file/${e.id}" target="_blank">Öppna</a></td></tr>`;});}
loadAll();
</script>
{% endblock %}
