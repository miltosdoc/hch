<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Webdoc API - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="glass-card" style="text-align: center;">
            <div style="background-color: var(--nav-bg); display: inline-block; padding: 0.75rem 1.5rem; border-radius: 0.5rem; margin-bottom: 1.5rem;">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="HCH Logo" onerror="this.style.display='none'" style="height: 45px; display: block;">
            </div>
            <h2>Integrationsportal</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Auktoriserad Åtkomst Krävs</p>
            
            {% if error %}
                <div class="alert error">{{ error }}</div>
            {% endif %}
            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
        </div>
    </div>
    
    <div style="position: absolute; top: 1rem; right: 1rem;">
        <button id="theme-toggle" class="btn-secondary" style="border-radius: 50%; padding: 0.5rem; border: none; background: transparent; cursor: pointer; font-size: 1.5rem;">🌙</button>
    </div>
    
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
