{% extends "base.html" %}
{% block topbar %}{% endblock %}
{% block title %}Login - HCH{% endblock %}
{% block content %}
<div class="login-wrap">
    <div class="login-card">
        <div class="login-banner">
            <img src="/static/logo.png" alt="HCH">
        </div>
        <div class="login-form-body">
            <h2>Logga in</h2>
            <p>Hjärtcentrum Halland</p>
            <form method="post">
                <div class="fl">
                    <label>Användarnamn</label>
                    <input type="text" name="username" autocomplete="username" required autofocus>
                </div>
                <div class="fl">
                    <label>Lösenord</label>
                    <input type="password" name="password" autocomplete="current-password" required>
                </div>
                <button class="btn bt" type="submit" style="width:100%;justify-content:center">Logga in</button>
                {% if error %}<div class="alert al-err mt12">{{ error }}</div>{% endif %}
            </form>
        </div>
    </div>
</div>
{% endblock %}
