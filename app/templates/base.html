<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}HCH{% endblock %}</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#09090b;--bg2:#18181b;--bg3:#27272a;--brd:#2a2a2e;--tx:#fafafa;--tx2:#a1a1aa;--tx3:#71717a;--bl:#3b82f6;--gr:#22c55e;--rd:#ef4444;--am:#f59e0b;--r:10px}
        body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);line-height:1.5;min-height:100vh}
        a{color:inherit;text-decoration:none}
        .nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--brd);padding:10px 16px;display:flex;align-items:center;gap:10px}
        .logo{font-weight:700;font-size:16px}.logo span{color:var(--bl)}
        .spacer{flex:1}
        .nl{padding:6px 14px;border-radius:8px;font-size:13px;color:var(--tx2);border:1px solid var(--brd);transition:all .15s;display:inline-flex;align-items:center;gap:5px;cursor:pointer}
        .nl:hover{background:var(--bg3);color:var(--tx)}.nl.home:hover{color:var(--bl);border-color:var(--bl)}.nl.out:hover{color:var(--rd);border-color:var(--rd)}
        .main{max-width:1100px;margin:0 auto;padding:24px 16px}
        @media(max-width:700px){.main{padding:14px 10px}}
        .card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:20px;margin-bottom:14px}
        .card h3{font-size:15px;font-weight:600;margin-bottom:10px}
        .agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
        @media(max-width:600px){.agrid{grid-template-columns:1fr 1fr}}
        @media(max-width:440px){.agrid{grid-template-columns:1fr}}
        .abtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:30px 16px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);transition:all .25s;min-height:120px;cursor:pointer}
        .abtn:hover{background:var(--bg3);border-color:var(--bl);transform:translateY(-2px);box-shadow:0 4px 24px rgba(59,130,246,.12)}
        .abtn .i{font-size:42px}.abtn .l{font-size:14px;font-weight:600;text-align:center}
        .h2{font-size:20px;font-weight:700;margin-bottom:14px}.t2{color:var(--tx2)}.t3{color:var(--tx3)}
        .fl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.fbtw{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
        .field{margin-bottom:13px}.field label{display:block;font-size:12px;color:var(--tx2);margin-bottom:5px;font-weight:500}
        input,select,textarea{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--brd);border-radius:8px;color:var(--tx);font-size:14px;font-family:inherit}
        input:focus,select:focus{outline:none;border-color:var(--bl)}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:600px){.row{grid-template-columns:1fr}}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit}
        .bbl{background:var(--bl);color:#fff}.bgh{background:none;border:1px solid var(--brd);color:var(--tx2)}.bgh:hover{background:var(--bg3);color:var(--tx)}
        .brd{background:var(--rd);color:#fff}.bgr{background:var(--gr);color:#fff}
        .upload{border:2px dashed var(--brd);border-radius:var(--r);padding:40px 20px;text-align:center;color:var(--tx2);cursor:pointer;transition:all .2s}
        .upload:hover{border-color:var(--bl);background:rgba(59,130,246,.05)}
        .al{padding:10px 14px;border-radius:8px;margin-bottom:10px;font-size:13px}
        .al-ok{background:#22c55e12;color:var(--gr);border:1px solid #22c55e33}
        .al-err{background:#ef444412;color:var(--rd);border:1px solid #ef444433}
        .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
        table{width:100%;border-collapse:collapse;font-size:13px}
        th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--brd);color:var(--tx3);font-size:11px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
        td{padding:8px 10px;border-bottom:1px solid var(--brd);vertical-align:middle}
        tr:hover>td{background:var(--bg3)}
        .bd{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}
        .bb{background:#3b82f61a;color:var(--bl)}.bg2{background:#22c55e1a;color:var(--gr)}.br{background:#ef44441a;color:var(--rd)}.by{background:#f59e0b1a;color:var(--am)}
        .mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mb12{margin-bottom:12px}
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="nav">
        <div class="logo">H<span>C</span></div>
        {% block nav_actions %}
        <a class="nl home" href="/dashboard">&#8592; Hem</a>
        {% endblock %}
        <div class="spacer"></div>
        <span class="t3" style="font-size:12px">{{ current_user.username }}</span>
        <a class="nl out" href="/logout">&#10005; Logga ut</a>
    </nav>
    <main class="main">{% block content %}{% endblock %}</main>
    {% block scripts %}{% endblock %}
</body>
</html>
