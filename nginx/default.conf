server {
    listen 80;
    server_name _;

    # Main portal
    location / {
        proxy_pass http://portal:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Holter Review - sub-app at /holter-review
    location /holter-review/ {
        proxy_pass http://holter-review:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /holter-review {
        return 301 /holter-review/;
    }

    # Holter Tracker - sub-app at /holter-tracker
    location /holter-tracker/ {
        proxy_pass http://holter-tracker:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /holter-tracker {
        return 301 /holter-tracker/;
    }

    # ECG Archive - sub-app at /ecg-archive
    location /ecg-archive/ {
        proxy_pass http://ecg-archive:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /ecg-archive {
        return 301 /ecg-archive/;
    }

    client_max_body_size 100M;
}
